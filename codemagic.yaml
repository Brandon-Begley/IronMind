workflows:
  ios-workflow:
    name: IronMind iOS
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS (no codesign)
        script: flutter build ios --release --no-codesign
      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r IronMind.ipa Payload
    artifacts:
      - build/ios/iphoneos/IronMind.ipa
