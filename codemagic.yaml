workflows:
  ironmind_ios_app_build:
    name: IronMind iOS App Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.ironmind.app
    scripts:
      - name: Install Flutter packages
        script: |
          cd IronMind-main
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd IronMind-main/ios
          pod install
      - name: Prepare signing
        script: |
          cd IronMind-main
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName IronMind" ios/Runner/Info.plist
          xcode-project use-profiles
      - name: Build IPA for testing
        script: |
          cd IronMind-main
          flutter build ipa \
            --release \
            --export-method ad-hoc \
            --build-name=5.0.0 \
            --build-number=$BUILD_NUMBER \
            --dart-define=EXERCISE_DB_API_KEY=$EXERCISE_DB_API_KEY
    artifacts:
      - IronMind-main/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
