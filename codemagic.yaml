workflows:
  ios-workflow:
    name: IronMind iOS
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set bundle ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier com.ironmind.app" ios/Runner/Info.plist
      - name: Disable code signing in Xcode
        script: |
          sed -i '' 's/CODE_SIGN_IDENTITY = .*/CODE_SIGN_IDENTITY = "";/' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_REQUIRED = .*/CODE_SIGNING_REQUIRED = NO;/' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGNING_ALLOWED = .*/CODE_SIGNING_ALLOWED = NO;/' ios/Runner.xcodeproj/project.pbxproj
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS (no codesign)
        script: |
          flutter build ios --release --no-codesign \
            --dart-define=FLUTTER_TARGET=lib/main.dart
      - name: Package IPA
        script: |
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/Runner.app
          zip -r IronMind.ipa Payload
    artifacts:
      - build/ios/iphoneos/IronMind.ipa
