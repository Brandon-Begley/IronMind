workflows:
  ios-altstore-ipa:
    name: IronMind iOS AltStore IPA
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # Replace with your real iOS bundle identifier if needed.
        BUNDLE_ID: com.ironmind.app
    scripts:
      - name: Set iOS bundle ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" ios/Runner/Info.plist
      - name: Install Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build unsigned release app
        script: |
          flutter build ios --release --no-codesign --config-only --dart-define=EXERCISE_DB_API_KEY=$EXERCISE_DB_API_KEY
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
      - name: Package unsigned IPA for AltServer
        script: |
          cd build/ios/archive/Runner.xcarchive/Products/Applications
          rm -rf Payload IronMind-AltStore.ipa
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          zip -r IronMind-AltStore.ipa Payload
    artifacts:
      - build/ios/archive/Runner.xcarchive/Products/Applications/IronMind-AltStore.ipa
      - build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app

  ios-unsigned-check:
    name: IronMind iOS Unsigned Check
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        # Replace with your real iOS bundle identifier in Codemagic if needed.
        BUNDLE_ID: com.ironmind.app
    scripts:
      - name: Set iOS bundle ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" ios/Runner/Info.plist
      - name: Install Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build unsigned iOS app
        script: |
          flutter build ios --release --no-codesign --config-only --dart-define=EXERCISE_DB_API_KEY=$EXERCISE_DB_API_KEY
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath build/ios/archive/Runner.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
    artifacts:
      - build/ios/archive/Runner.xcarchive/Products/Applications/Runner.app

  ios-app-store:
    name: IronMind iOS App Store
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        # Must match the bundle identifier configured in Apple Developer/App Store Connect.
        bundle_identifier: com.ironmind.app
      vars:
        # Keep this in sync with the value above.
        BUNDLE_ID: com.ironmind.app
      groups:
        # Replace with your Codemagic variable group that contains Apple credentials.
        - APP_STORE_CREDENTIALS
    integrations:
      # Replace with your Codemagic App Store Connect integration name.
      app_store_connect: APP_STORE_CONNECT_INTEGRATION
    scripts:
      - name: Set iOS bundle ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleIdentifier $BUNDLE_ID" ios/Runner/Info.plist
      - name: Install Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build signed IPA
        script: |
          flutter build ipa --release --export-method app-store --dart-define=EXERCISE_DB_API_KEY=$EXERCISE_DB_API_KEY
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
