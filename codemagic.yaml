workflows:
  android-build:
    name: Android Build
    instance_type: linux_x2
    flutter: 3.41.5
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build APK
        script: flutter build apk --release

  ios-build:
    name: iOS Build
    instance_type: mac_mini_m1
    flutter: 3.41.5
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS
        script: flutter build ios --release --no-codesign
